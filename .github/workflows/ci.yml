name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**/*.md"

jobs:
  # ── Backend: pytest ──────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zedread_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: pos-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pos-backend/requirements.txt

      - name: Install weasyprint system libraries (Stage 21 PDF export)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libcairo2 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations on test DB
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/zedread_test
        run: alembic upgrade head

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/zedread_test
          SKIP_DB_STARTUP_CHECK: "true"
          SECRET_KEY: ci-secret-key-not-used-in-production
          LOG_FORMAT: dev
        run: pytest -q

  # ── Portal: TypeScript build ─────────────────────────────────────────────────
  portal:
    name: Portal build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pos-portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: pos-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build

  # ── Android: debug APK build ─────────────────────────────────────────────────
  #
  # No gradlew is checked in yet (nothing in this repo has generated one —
  # see ANDROID_POS_BUILD_PLAN.md), so gradle/actions/setup-gradle provisions
  # Gradle itself, pinned to the version gradle-wrapper.properties targets,
  # rather than falling back to whatever system `gradle` a runner image
  # happens to ship (that drifts over time — a bare `gradle` call here
  # first failed against a runner on Gradle 9.6.1, well past what AGP 8.7.3
  # supports). Once gradlew is committed this job should switch to it, at
  # which point setup-gradle auto-detects the wrapper's version instead.
  android:
    name: Android build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pos-android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        run: gradle assembleDebug --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: zedread-pos-debug-apk
          path: pos-android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
