name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Backend: pytest ──────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: zedread_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: pos-backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pos-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations on test DB
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/zedread_test
        run: alembic upgrade head

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5433/zedread_test
          SKIP_DB_STARTUP_CHECK: "true"
          SECRET_KEY: ci-secret-key-not-used-in-production
          LOG_FORMAT: dev
        run: pytest -q

  # ── Portal: TypeScript build ─────────────────────────────────────────────────
  portal:
    name: Portal build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pos-portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: pos-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
