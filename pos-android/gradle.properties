# Project-wide Gradle settings.

# AndroidX is required by every dependency in this project (Compose, Room,
# Hilt, Navigation, DataStore) - without this the build fails at
# :app:checkDebugAarMetadata ("Configuration ... contains AndroidX
# dependencies, but the android.useAndroidX property is not enabled").
android.useAndroidX=true

# Avoids R class field clashes across modules by scoping each module's R
# class to its own resources instead of merging all dependencies' into one.
android.nonTransitiveRClass=true

# Kotlin code style used by IDE formatting - matches Android Studio's default.
kotlin.code.style=official

# Increases the JVM heap available to the Gradle daemon - the Compose/Hilt/
# Room annotation processors are memory-hungry on the default 512m.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Run Gradle tasks across subprojects in parallel where possible.
org.gradle.parallel=true
