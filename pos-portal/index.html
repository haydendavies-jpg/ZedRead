<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZedRead Portal</title>
    <!--
      Async font load: a CSS `@import url(...)` (the previous approach) and a
      plain `<link rel="stylesheet">` are both render-blocking — the page
      won't paint/become interactive until fonts.googleapis.com responds (or
      the browser gives up), which stalls first load for several seconds on
      any flaky connection to that host (corporate firewall, ad blocker,
      offline demo). `rel="preload"` fetches the stylesheet without blocking
      render; the onload handler swaps it to a real stylesheet once it
      arrives, and the <noscript> fallback covers non-JS rendering.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
